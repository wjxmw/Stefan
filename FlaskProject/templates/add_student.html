<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>添加学生信息</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://cdn.jsdelivr.net/npm/font-awesome@4.7.0/css/font-awesome.min.css" rel="stylesheet">
    <style>
        body {
            font-family: 'Inter', sans-serif;
            line-height: 1.6;
        }
        .form-container {
            max-width: 800px;
            margin: 0 auto;
            padding: 20px;
            background: #fff;
            border-radius: 12px;
            box-shadow: 0 4px 24px rgba(0,0,0,0.06);
        }
        .input-group {
            margin-bottom: 1.8rem;
            position: relative;
        }
        .input-label {
            display: block;
            margin-bottom: 0.6rem;
            color: #4E5969;
            font-size: 0.95rem;
            font-weight: 500;
        }
        .form-input {
            width: 100%;
            padding: 0.9rem 1.2rem;
            border: 1px solid #E5E7EB;
            border-radius: 8px;
            font-size: 1rem;
            background-color: #F3F4F6;
            transition: all 0.3s ease;
        }
        .form-input:focus {
            border-color: #165DFF;
            outline: none;
            box-shadow: 0 0 0 2px rgba(22, 93, 255, 0.15);
            background-color: #fff;
        }
        .error-message {
            color: #DC2626;
            font-size: 0.875rem;
            margin-top: 0.3rem;
            display: none;
        }
        /* 按钮样式 */
        .button-group {
            display: flex;
            justify-content: center;
            align-items: center;
            margin: 2.5rem 0;
        }
        .primary-button {
            background-color: #165DFF;
            color: white;
            border: none;
            border-radius: 25px;
            padding: 0.9rem 2.8rem;
            font-size: 1rem;
            font-weight: 600;
            cursor: pointer;
            transition: all 0.3s ease;
            box-shadow: 0 4px 12px rgba(22, 93, 255, 0.1);
            display: flex;
            align-items: center;
            gap: 0.6rem;
        }
        .primary-button:hover {
            background-color: #0e47c4;
            box-shadow: 0 6px 18px rgba(22, 93, 255, 0.2);
            transform: translateY(-1px);
        }
        .primary-button:active {
            transform: translateY(0px);
            box-shadow: 0 2px 6px rgba(22, 93, 255, 0.1);
        }
        .secondary-button {
            background-color: #F3F4F6;
            color: #4E5969;
            border: 1px solid #D1D5DB;
            border-radius: 25px;
            padding: 0.9rem 2.8rem;
            font-size: 1rem;
            font-weight: 500;
            cursor: pointer;
            transition: all 0.3s ease;
            display: block;
            text-align: center;
            max-width: 200px;
            margin: 0 auto;
        }
        .secondary-button:hover {
            background-color: #E5E7EB;
            border-color: #C1C5CE;
        }
        .course-table {
            width: 100%;
            border-collapse: collapse;
            margin-top: 1rem;
        }
        .course-table th, .course-table td {
            padding: 0.75rem;
            border: 1px solid #E5E7EB;
            text-align: left;
        }
        .course-table th {
            background-color: #F3F4F6;
            font-weight: 600;
        }
        .add-course-btn {
            background-color: #36B37E;
            color: white;
            border: none;
            border-radius: 6px;
            padding: 0.5rem 1rem;
            font-size: 0.9rem;
            cursor: pointer;
            transition: all 0.3s ease;
            display: inline-flex;
            align-items: center;
            gap: 0.5rem;
        }
        .add-course-btn:hover {
            background-color: #2B9A6C;
        }
        .remove-btn {
            background-color: #F5222D;
            color: white;
            border: none;
            border-radius: 4px;
            padding: 0.3rem 0.6rem;
            font-size: 0.8rem;
            cursor: pointer;
            transition: all 0.3s ease;
        }
        .remove-btn:hover {
            background-color: #D91E18;
        }
        .success-message {
            color: #36B37E;
            font-size: 0.875rem;
            margin-top: 0.3rem;
            display: none;
        }
    </style>
</head>
<body class="bg-gray-50">
    <!-- 顶部导航栏 -->
    <nav class="bg-white shadow-md fixed w-full top-0 z-10">
        <div class="container mx-auto px-4 py-3 flex justify-between items-center">
            <div class="flex items-center space-x-2">
                <i class="fa fa-shield text-blue-600 text-2xl"></i>
                <a href="/admin_manage" class="text-xl font-bold text-blue-600">学生管理系统</a>
            </div>
        </div>
    </nav>

    <!-- 主内容区 -->
    <main class="form-container pt-24 pb-16">
        <h2 class="text-2xl font-bold text-gray-800 mb-6 text-center">新增学生档案</h2>

        <form id="studentForm" onsubmit="return validateForm(event)">
            <div class="input-group">
                <label class="input-label" for="stu_id">学号（9位数字）</label>
                <input type="text"
                       id="stu_id"
                       name="stu_id"
                       class="form-input"
                       placeholder="请输入9位学号"
                       pattern="[0-9]{9}"
                       required>
                <div class="error-message" id="stu_id_error">学号必须为9位数字</div>
            </div>

            <div class="input-group">
                <label class="input-label" for="name">姓名</label>
                <input type="text"
                       id="name"
                       name="name"
                       class="form-input"
                       placeholder="请输入姓名"
                       required>
                <div class="error-message" id="name_error">请输入姓名</div>
            </div>

            <div class="input-group">
                <label class="input-label" for="gender">性别</label>
                <select id="gender" name="gender" class="form-input" required>
                    <option value="">请选择性别</option>
                    <option value="男">男</option>
                    <option value="女">女</option>
                </select>
                <div class="error-message" id="gender_error">请选择性别</div>
            </div>

            <div class="input-group">
                <label class="input-label" for="birth_date">出生日期</label>
                <input type="date"
                       id="birth_date"
                       name="birth_date"
                       class="form-input"
                       required>
                <div class="error-message" id="birth_date_error">请选择出生日期</div>
            </div>

            <div class="input-group">
                <label class="input-label" for="major">专业</label>
                <input type="text"
                       id="major"
                       name="major"
                       class="form-input"
                       placeholder="请输入专业名称"
                       required>
                <div class="error-message" id="major_error">请输入专业名称</div>
            </div>

            <div class="input-group">
                <label class="input-label" for="class_id">班级</label>
                <input type="text"
                       id="class_id"
                       name="class_id"
                       class="form-input"
                       placeholder="请输入班级号"
                       required>
                <div class="error-message" id="class_id_error">请输入班级号</div>
            </div>

            <!-- 课程信息区域 -->
            <div class="input-group">
                <label class="input-label">课程信息</label>
                <div id="course-container">
                    <div class="course-entry" id="course-0">
                        <div class="grid grid-cols-1 md:grid-cols-3 gap-4 mb-3">
                            <div>
                                <label class="input-label text-sm" for="course_name-0">课程名称</label>
                                <input type="text"
                                       id="course_name-0"
                                       name="course_name[]"
                                       class="form-input"
                                       placeholder="课程名称"
                                       required>
                                <div class="error-message" id="course_name_error-0">请输入课程名称</div>
                            </div>
                            <div>
                                <label class="input-label text-sm" for="grade-0">课程成绩</label>
                                <input type="number"
                                       id="grade-0"
                                       name="grade[]"
                                       class="form-input"
                                       min="0"
                                       max="100"
                                       required>
                                <div class="error-message" id="grade_error-0">成绩需在0-100之间</div>
                            </div>
                            <div>
                                <label class="input-label text-sm" for="exam_date-0">考试日期</label>
                                <input type="date"
                                       id="exam_date-0"
                                       name="exam_date[]"
                                       class="form-input"
                                       required>
                                <div class="error-message" id="exam_date_error-0">请选择考试日期</div>
                            </div>
                        </div>
                    </div>
                </div>
                <button type="button" id="add-course-btn" class="add-course-btn mt-2">
                    <i class="fa fa-plus"></i> 添加课程
                </button>
                <div class="error-message" id="course_duplicate_error">该课程已存在，不能重复添加</div>
                <div class="success-message" id="course_added_success">课程已添加</div>
            </div>

            <!-- 居中按钮容器 -->
            <div class="button-group">
                <button
                    type="submit"
                    class="primary-button"
                >
                    <i class="fa fa-check"></i>
                    提交学生信息
                </button>
            </div>

            <a href="/admin_manage" class="secondary-button mt-4">返回</a>
        </form>
    </main>

    <script>
        // 课程计数器
        let courseCount = 0;

        // 初始化添加课程按钮
        document.getElementById('add-course-btn').addEventListener('click', addCourse);

        function addCourse() {
            // 隐藏所有错误和成功消息
            document.querySelectorAll('.error-message').forEach(el => el.style.display = 'none');
            document.getElementById('course_added_success').style.display = 'none';

            // 获取当前课程信息
            const currentCourseName = document.getElementById(`course_name-${courseCount}`).value.trim();

            // 检查课程是否已存在
            if (currentCourseName) {
                for (let i = 0; i < courseCount; i++) {
                    const existingCourseName = document.getElementById(`course_name-${i}`).value.trim();
                    if (existingCourseName && existingCourseName === currentCourseName) {
                        document.getElementById('course_duplicate_error').style.display = 'block';
                        return;
                    }
                }
            }

            // 增加课程计数器
            courseCount++;

            // 创建新的课程输入区域
            const courseContainer = document.getElementById('course-container');
            const newCourseEntry = document.createElement('div');
            newCourseEntry.className = 'course-entry border-t pt-4 mt-4';
            newCourseEntry.id = `course-${courseCount}`;

            newCourseEntry.innerHTML = `
                <div class="grid grid-cols-1 md:grid-cols-3 gap-4 mb-3">
                    <div>
                        <label class="input-label text-sm" for="course_name-${courseCount}">课程名称</label>
                        <input type="text"
                               id="course_name-${courseCount}"
                               name="course_name[]"
                               class="form-input"
                               placeholder="课程名称"
                               required>
                        <div class="error-message" id="course_name_error-${courseCount}">请输入课程名称</div>
                    </div>
                    <div>
                        <label class="input-label text-sm" for="grade-${courseCount}">课程成绩</label>
                        <input type="number"
                               id="grade-${courseCount}"
                               name="grade[]"
                               class="form-input"
                               min="0"
                               max="100"
                               required>
                        <div class="error-message" id="grade_error-${courseCount}">成绩需在0-100之间</div>
                    </div>
                    <div>
                        <label class="input-label text-sm" for="exam_date-${courseCount}">考试日期</label>
                        <input type="date"
                               id="exam_date-${courseCount}"
                               name="exam_date[]"
                               class="form-input"
                               required>
                        <div class="error-message" id="exam_date_error-${courseCount}">请选择考试日期</div>
                    </div>
                </div>
                <button type="button" onclick="removeCourse(${courseCount})" class="remove-btn">
                    <i class="fa fa-trash"></i> 移除
                </button>
            `;

            // 添加到容器
            courseContainer.appendChild(newCourseEntry);

            // 显示成功消息
            document.getElementById('course_added_success').style.display = 'block';

            // 滚动到新添加的课程
            newCourseEntry.scrollIntoView({ behavior: 'smooth', block: 'nearest' });
        }

        function removeCourse(index) {
            const courseEntry = document.getElementById(`course-${index}`);
            if (courseEntry) {
                courseEntry.remove();

                // 调整剩余课程的索引
                for (let i = index + 1; i <= courseCount; i++) {
                    const nextEntry = document.getElementById(`course-${i}`);
                    if (nextEntry) {
                        // 更新ID和标签
                        const newIndex = i - 1;
                        nextEntry.id = `course-${newIndex}`;

                        // 更新所有子元素的ID和标签
                        const elements = nextEntry.querySelectorAll('[id], [for], [name]');
                        elements.forEach(el => {
                            const id = el.id;
                            if (id) {
                                el.id = id.replace(`-${i}`, `-${newIndex}`);
                            }

                            const forAttr = el.getAttribute('for');
                            if (forAttr) {
                                el.setAttribute('for', forAttr.replace(`-${i}`, `-${newIndex}`));
                            }

                            const name = el.name;
                            if (name) {
                                el.name = name.replace(`[${i}]`, `[${newIndex}]`);
                            }
                        });

                        // 更新移除按钮的onclick
                        const removeBtn = nextEntry.querySelector('.remove-btn');
                        if (removeBtn) {
                            removeBtn.setAttribute('onclick', `removeCourse(${newIndex})`);
                        }
                    }
                }

                // 减少计数器
                courseCount--;
            }
        }

        function validateForm(event) {
            event.preventDefault();
            const inputs = document.querySelectorAll('input, select');
            let isValid = true;

            // 清除所有错误信息
            document.querySelectorAll('.error-message').forEach(msg => {
                msg.style.display = 'none';
            });

            // 学号校验
            const stuId = document.getElementById('stu_id').value;
            if (!/^\d{9}$/.test(stuId)) {
                document.getElementById('stu_id_error').style.display = 'block';
                isValid = false;
            }

            // 其他字段非空校验
            inputs.forEach(input => {
                if (input.required && input.value.trim() === '') {
                    const errorMsg = document.getElementById(`${input.id}_error`);
                    if (errorMsg) {
                        errorMsg.style.display = 'block';
                        isValid = false;
                    }
                }
            });

            // 课程成绩范围校验
            for (let i = 0; i <= courseCount; i++) {
                const gradeInput = document.getElementById(`grade-${i}`);
                if (gradeInput) {
                    const grade = parseInt(gradeInput.value);
                    if (isNaN(grade) || grade < 0 || grade > 100) {
                        document.getElementById(`grade_error-${i}`).style.display = 'block';
                        isValid = false;
                    }
                }
            }

            // 检查课程重复
            const courseNames = [];
            for (let i = 0; i <= courseCount; i++) {
                const courseNameInput = document.getElementById(`course_name-${i}`);
                if (courseNameInput && courseNameInput.value.trim()) {
                    const courseName = courseNameInput.value.trim();
                    if (courseNames.includes(courseName)) {
                        document.getElementById('course_duplicate_error').style.display = 'block';
                        isValid = false;
                        break;
                    }
                    courseNames.push(courseName);
                }
            }

            if (isValid) {
                // 创建 JSON 数据对象
                const studentData = {
                    stu_id: document.getElementById('stu_id').value,
                    name: document.getElementById('name').value,
                    gender: document.getElementById('gender').value,
                    birth_date: document.getElementById('birth_date').value,
                    major: document.getElementById('major').value,
                    class_id: document.getElementById('class_id').value,
                    courses: []
                };

                // 收集所有课程信息
                for (let i = 0; i <= courseCount; i++) {
                    const courseName = document.getElementById(`course_name-${i}`)?.value;
                    const grade = document.getElementById(`grade-${i}`)?.value;
                    const examDate = document.getElementById(`exam_date-${i}`)?.value;

                    if (courseName && grade && examDate) {
                        studentData.courses.push({
                            course_name: courseName,
                            grade: parseInt(grade),
                            exam_date: examDate
                        });
                    }
                }

                console.log('准备提交的JSON数据:', studentData);

                fetch('/api/students/add', {
                    method: 'POST',
                    headers: {
                        'Content-Type': 'application/json'
                    },
                    body: JSON.stringify(studentData)
                })
                .then(response => {
                    console.log('服务器响应状态:', response.status);

                    if (!response.ok) {
                        throw new Error(`HTTP错误，状态码: ${response.status}`);
                    }

                    return response.json();
                })
                .then(data => {
                    console.log('服务器返回数据:', data);
                    if (data.success) {
                        alert('提交成功');
                        window.location.href = '/admin_manage';
                    } else {
                        alert('提交失败：' + data.message);
                    }
                })
                .catch(error => {
                    alert('操作失败：' + error.message);
                    console.error('Fetch错误:', error);
                });
            }
            return false;
        }
    </script>
</body>
</html>
