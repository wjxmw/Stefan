<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>学生信息管理系统</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <style>
        .header {
            text-align: center;
            margin-top: 150px;
            color: white;
            text-shadow: 0 2px 15px rgba(0, 0, 0, 0.3);
        }

        .title {
            font-size: 3.5rem;
            margin-bottom: 20px;
            letter-spacing: 3px;
            background: linear-gradient(to bottom, #3498db, #2ecc71);
            -webkit-background-clip: text;
            background-clip: text;
            color: transparent;
        }

        .subtitle {
            font-size: 1.3rem;
            color: #f0f0f0;
            margin-bottom: 40px;
            font-weight: 300;
        }

        .button-group {
            display: flex;
            flex-direction: column;
            gap: 25px;
            max-width: 500px;
            margin: 0 auto;
        }

        .custom-button {
            width: 100%;
            height: 70px;
            font-size: 1.2rem;
            color: white;
            border: none;
            border-radius: 30px;
            cursor: pointer;
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 20px;
            transition: all 0.3s ease;
            position: relative;
            overflow: hidden;
            box-shadow: 0 5px 15px rgba(0, 0, 0, 0.1);
        }

        .custom-button::before {
            content: "";
            position: absolute;
            width: 0;
            height: 100%;
            background: rgba(255, 255, 255, 0.1);
            left: 0;
            transition: width 0.3s ease;
        }

        .custom-button:hover::before {
            width: 100%;
        }

        .admin-btn {
            background: #3498db;
        }

        .student-btn {
            background: #2ecc71;
        }

        .exit-btn {
            background: #e74c3c;
        }

        .custom-button i {
            font-size: 1.6rem;
        }

        /* 响应式调整 */
        @media (max-width: 768px) {
            .title {
                font-size: 2.5rem;
            }

            .custom-button {
                height: 60px;
                font-size: 1.1rem;
            }
        }
    </style>
</head>
<body>

    <div class="container">
        <header class="header">
            <h1 class="title">学生信息管理系统</h1>
            <p class="subtitle">Student Information Management System</p>
        </header>

        <div class="button-group">
            <a href="/admin_login" class="custom-button admin-btn">
                <i class="fas fa-shield-alt"></i>
                管理员登录
            </a>

            <a href="/student_login" class="custom-button student-btn">
                <i class="fas fa-user-graduate"></i>
                学生登录
            </a>

            <button class="custom-button exit-btn" onclick="confirmExit()">
                <i class="fas fa-sign-out-alt"></i>
                退出系统
            </button>
        </div>
    </div>

    <script>
        function confirmExit() {
            if (confirm('您确定要退出系统吗？')) {
                window.close();
            }
        }
    </script>
</body>
</html>
